apiVersion: apps/v1
kind: Deployment
metadata:
  name: items-deployment
  namespace: restauranty-lily
  labels:
    app: items
spec:
  replicas: 2
  selector:
    matchLabels:
      app: items
  template:
    metadata:
      labels:
        app: items
    spec:
      containers:
        - name: items
          image: lilywalch/restauranty-items-service:latest
          ports:
            - containerPort: 3004
          env:
            - name: SECRET
              valueFrom:
                secretKeyRef:
                  name: restauranty-secrets
                  key: SECRET
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: restauranty-secrets
                  key: MONGODB_URI
            - name: CLOUD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: restauranty-secrets
                  key: CLOUD_API_KEY
            - name: CLOUD_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: restauranty-secrets
                  key: CLOUD_API_SECRET
            - name: CLOUD_NAME
              valueFrom:
                secretKeyRef:
                  name: restauranty-secrets
                  key: CLOUD_NAME
            - name: PORT
              value: "3004"