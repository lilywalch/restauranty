apiVersion: apps/v1
kind: Deployment
metadata:
  name: discounts-deployment
  namespace: restauranty-lily
  labels:
    app: discounts
spec:
  replicas: 2
  selector:
    matchLabels:
      app: discounts
  template:
    metadata:
      labels:
        app: discounts
    spec:
      containers:
        - name: discounts
          image: lilywalch/restauranty-discounts-service:latest
          ports:
            - name: http
              containerPort: 3003
          env:
            - name: SECRET
              valueFrom:
                secretKeyRef:
                  name: restauranty-secrets
                  key: SECRET
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: restauranty-secrets
                  key: MONGODB_URI
            - name: CLOUD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: restauranty-secrets
                  key: CLOUD_API_KEY
            - name: CLOUD_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: restauranty-secrets
                  key: CLOUD_API_SECRET
            - name: CLOUD_NAME
              valueFrom:
                secretKeyRef:
                  name: restauranty-secrets
                  key: CLOUD_NAME
            - name: PORT
              value: "3003"